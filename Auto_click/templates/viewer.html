<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        #slide-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img id="slide-image" src="/static/slides/slide1.png" alt="Slide">

    <script>
        const socket = io();
        let currentSlide = 1;
        const totalSlides = 7;

        // មុខងារ Preload: ទាញរូបទាំង៧ទុកក្នុង Browser ជាមុនដើម្បីកុំឲ្យយឺតពេលប្តូរ
        for (let i = 1; i <= totalSlides; i++) {
            const img = new Image();
            img.src = `/static/slides/slide${i}.png`;
        }

        socket.on('change_slide', function(data) {
            if (data.direction === 'next' && currentSlide < totalSlides) {
                currentSlide++;
            } else if (data.direction === 'prev' && currentSlide > 1) {
                currentSlide--;
            }
            
            document.getElementById('slide-image').src = `/static/slides/slide${currentSlide}.png`;
        });
    </script>
</body>
</html>
