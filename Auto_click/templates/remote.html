<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Remote</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
            overflow: hidden;
            touch-action: none; /* ការពារការអូសរំកិលទំព័រ (Pull-to-refresh) លើទូរស័ព្ទ */
        }
        .status-bar {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .touch-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: #64748b;
            text-align: center;
            padding: 20px;
        }
        .button-container {
            display: flex;
            height: 35vh; /* ប៊ូតុងធំៗខាងក្រោម */
        }
        button {
            flex: 1;
            border: none;
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: background 0.1s;
        }
        .btn-prev {
            background-color: #334155;
            border-right: 1px solid #1e293b;
        }
        .btn-prev:active { background-color: #475569; }
        
        .btn-next {
            background-color: #2563eb;
        }
        .btn-next:active { background-color: #3b82f6; }
        
        #status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ef4444; /* ក្រហមពេលដាច់ខ្សែ */
            margin-right: 8px;
        }
        .connected #status-dot { background-color: #22c55e; /* បៃតងពេលភ្ជាប់ជាប់ */ }
    </style>
</head>
<body id="swipe-zone">

    <div class="status-bar" id="status-bar">
        <span id="status-dot"></span><span id="status-text">Connecting...</span>
    </div>

    <div class="touch-area">
        អូសឆ្វេងឬស្តាំ <br> (Swipe Left / Right)<br>នៅលើផ្ទៃនេះ
    </div>

    <div class="button-container">
        <button class="btn-prev" onclick="sendPrev()">&#10094; PREV</button>
        <button class="btn-next" onclick="sendNext()">NEXT &#10095;</button>
    </div>

    <script>
        const socket = io();

        // គ្រប់គ្រងស្ថានភាពនៃការភ្ជាប់
        socket.on('connect', () => {
            document.getElementById('status-bar').classList.add('connected');
            document.getElementById('status-text').innerText = 'Remote Ready';
        });

        socket.on('disconnect', () => {
            document.getElementById('status-bar').classList.remove('connected');
            document.getElementById('status-text').innerText = 'Disconnected';
        });

        // មុខងារបញ្ជូនសញ្ញា
        function sendNext() { socket.emit('next_slide'); }
        function sendPrev() { socket.emit('prev_slide'); }

        // មុខងារអូស (Swipe Logic) សម្រាប់ទូរស័ព្ទ
        let touchstartX = 0;
        let touchendX = 0;
        const swipeZone = document.getElementById('swipe-zone');

        swipeZone.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);

        swipeZone.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const minSwipeDistance = 50; // កំណត់ចម្ងាយនៃការអូស
            if (touchendX < touchstartX - minSwipeDistance) {
                sendNext(); // អូសទៅឆ្វេង = Next
            }
            if (touchendX > touchstartX + minSwipeDistance) {
                sendPrev(); // អូសទៅស្តាំ = Prev
            }
        }
    </script>
</body>
</html>
