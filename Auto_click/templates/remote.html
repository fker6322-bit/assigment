<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            justify-content: center;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
            text-transform: uppercase;
        }
        button:active {
            background-color: #2563eb;
            transform: scale(0.98);
        }
        .btn-prev {
            background-color: #475569;
        }
        .btn-prev:active {
            background-color: #334155;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Presentation Remote</h1>
        <p>Status: <span id="status" style="color: #4ade80;">Connecting...</span></p>
    </div>

    <div class="controls">
        <button class="btn-prev" onclick="sendPrev()">Previous Slide</button>
        <button class="btn-next" onclick="sendNext()">Next Slide</button>
    </div>

    <script>
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('status').innerText = 'Connected';
            document.getElementById('status').style.color = '#4ade80';
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = 'Disconnected';
            document.getElementById('status').style.color = '#f87171';
        });

        function sendNext() {
            socket.emit('next_slide');
        }

        function sendPrev() {
            socket.emit('prev_slide');
        }
    </script>
</body>
</html>
