<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Remote</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        .status-bar {
            text-align: center;
            padding: 15px;
            font-size: 1rem;
            background: #1e293b;
            font-weight: bold;
        }
        #status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ef4444;
            margin-right: 8px;
        }
        .connected #status-dot { background-color: #22c55e; }
        
        .preview-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-color: #000000;
        }
        #remote-slide-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        
        .button-container {
            display: flex;
            height: 25vh; /* កម្ពស់ប៊ូតុងខាងក្រោម */
        }
        button {
            flex: 1;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .btn-prev { background-color: #334155; border-right: 1px solid #1e293b; }
        .btn-prev:active { background-color: #475569; }
        .btn-next { background-color: #2563eb; }
        .btn-next:active { background-color: #3b82f6; }
    </style>
</head>
<body>

    <div class="status-bar" id="status-bar">
        <span id="status-dot"></span><span id="status-text">Connecting...</span>
    </div>

    <div class="preview-container" id="swipe-zone">
        <img id="remote-slide-image" src="/static/slides/slide1.png" alt="Slide Preview">
    </div>

    <div class="button-container">
        <button class="btn-prev" onclick="sendPrev()">&#10094; PREV</button>
        <button class="btn-next" onclick="sendNext()">NEXT &#10095;</button>
    </div>

    <script>
        const socket = io();
        let currentSlide = 1;
        const totalSlides = 7;

        // មុខងារ Preload សម្រាប់ទូរស័ព្ទ
        for (let i = 1; i <= totalSlides; i++) {
            const img = new Image();
            img.src = `/static/slides/slide${i}.png`;
        }

        socket.on('connect', () => {
            document.getElementById('status-bar').classList.add('connected');
            document.getElementById('status-text').innerText = 'Remote Ready';
        });

        socket.on('disconnect', () => {
            document.getElementById('status-bar').classList.remove('connected');
            document.getElementById('status-text').innerText = 'Disconnected';
        });

        // ពេលមានសញ្ញាប្តូរស្លាយ ឲ្យទូរស័ព្ទប្តូររូបដែរ
        socket.on('change_slide', function(data) {
            if (data.direction === 'next' && currentSlide < totalSlides) {
                currentSlide++;
            } else if (data.direction === 'prev' && currentSlide > 1) {
                currentSlide--;
            }
            document.getElementById('remote-slide-image').src = `/static/slides/slide${currentSlide}.png`;
        });

        function sendNext() { socket.emit('next_slide'); }
        function sendPrev() { socket.emit('prev_slide'); }

        // មុខងារអូស (Swipe Logic) លើរូបភាព
        let touchstartX = 0;
        let touchendX = 0;
        const swipeZone = document.getElementById('swipe-zone');

        swipeZone.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);

        swipeZone.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const minSwipeDistance = 50; 
            if (touchendX < touchstartX - minSwipeDistance) sendNext();
            if (touchendX > touchstartX + minSwipeDistance) sendPrev();
        }
    </script>
</body>
</html>
